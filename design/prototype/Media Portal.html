<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AERIE — Media Command Center</title>

<!-- Design system foundations -->
<link rel="stylesheet" href="assets/fonts.css" />
<link rel="stylesheet" href="assets/colors_and_type.css" />
<link rel="stylesheet" href="assets/components.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..24,100..700,0..1,-25..0" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" />

<script>
  // default theme = dark; honor persisted tweak override if present
  (function () {
    document.documentElement.classList.add('dark');
  })();
</script>

<style>
  html, body, #root { height: 100%; }
  body { margin: 0; overflow: hidden; }
  #root { display: flex; }
  a { color: inherit; }
  ::selection { background: color-mix(in srgb, var(--primary) 30%, transparent); }

  @keyframes aeriePulse {
    0%   { transform: scale(1);   opacity: 0.55; }
    70%  { transform: scale(2.6); opacity: 0; }
    100% { transform: scale(2.6); opacity: 0; }
  }
  @keyframes aerieEq {
    0%, 100% { transform: scaleY(0.35); }
    50%      { transform: scaleY(1); }
  }
  @keyframes aerieSpin { to { transform: rotate(360deg); } }
</style>
