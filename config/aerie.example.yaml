# ============================================================
# AERIE — declarative service config (example)
#
# Copy this to config/aerie.yaml (or point AERIE_CONFIG_FILE elsewhere)
# to define your services without using the Admin UI:
#   cp config/aerie.example.yaml config/aerie.yaml
#
# How it's applied (see lib/config/apply.ts):
#   • On boot this file is reconciled into the DB as a *gap-fill* — it
#     only inserts services / secrets / visibility that don't already
#     exist. Anything you've edited in the Admin UI always wins and is
#     never overwritten, so the file is safe to re-apply on every boot.
#   • A service goes "live" only once it has an apiKey; without one it
#     shows mock/placeholder data (graceful degradation).
#
# Secrets: never put raw keys here. Reference an env var as ${VAR} and
# set it in your .env / compose file. An unset var resolves to empty,
# which just leaves that service unconfigured (mock data).
# ============================================================

services:
  # ── Streaming ──────────────────────────────────────────────
  - id: plex
    name: Plex
    cat: stream
    icon: play_circle
    host: app.plex.tv
    embeddable: false
    central: true
    centralLabel: Stream
    note: "External · launch only"

  - id: jellyfin
    name: Jellyfin
    cat: stream
    icon: smart_display
    host: jellyfin.aerie.tv
    embeddable: true
    # keepAlive keeps the embedded iframe mounted (hidden) after first open so switching between
    # services preserves its state instead of reloading. Only applies to embeddable services; the
    # app keeps running in the background while hidden. Defaults to false.
    keepAlive: true
    central: true
    centralLabel: Stream
    note: "Embeds in portal"
    apiKey: ${JELLYFIN_API_KEY}

  # ── Requests ───────────────────────────────────────────────
  - id: overseerr
    name: Overseerr
    cat: request
    icon: playlist_add
    host: requests.aerie.tv
    embeddable: true
    central: true
    centralLabel: Requests
    note: "Per-user requests"
    apiKey: ${OVERSEERR_API_KEY}

  # ── Automation ─────────────────────────────────────────────
  - id: sonarr
    name: Sonarr
    cat: automation
    icon: live_tv
    host: sonarr.aerie.tv
    embeddable: true
    note: "TV automation"
    apiKey: ${SONARR_API_KEY}
    # lokiQuery: optional LogQL selector for the admin-only Logs viewer (Admin → Services → Logs).
    # Only used when a Loki source is configured (see below). Omit to use the inferred default
    # {container="<id>"} — set this when the container/label name differs from the service id.
    lokiQuery: '{container="sonarr"}'

  - id: radarr
    name: Radarr
    cat: automation
    icon: movie
    host: radarr.aerie.tv
    embeddable: true
    note: "Movie automation"
    apiKey: ${RADARR_API_KEY}

  - id: prowlarr
    name: Prowlarr
    cat: automation
    icon: travel_explore
    host: prowlarr.aerie.tv
    embeddable: true
    note: "Indexer manager"
    apiKey: ${PROWLARR_API_KEY}

  - id: qbittorrent
    name: qBittorrent
    cat: automation
    icon: downloading
    host: qbit.aerie.tv
    embeddable: true
    note: "Download client"
    # qBittorrent has no API key — it authenticates with a form-POST login (cookie session),
    # so pack WebUI username + password as "username:password" (same convention as NZBGet/Beszel).
    apiKey: ${QBITTORRENT_CREDENTIALS}   # e.g. admin:adminadmin

  - id: nzbget
    name: NZBGet
    cat: automation
    icon: download
    host: nzbget.aerie.tv
    embeddable: true
    note: "Usenet downloader"
    # NZBGet has no API key — it authenticates with HTTP Basic auth, so pack
    # ControlUsername + ControlPassword as "username:password" (split on the
    # first ":", same convention as Beszel). Feeds the Download Queue panel;
    # when Sonarr/Radarr are also configured a source toggle appears there.
    apiKey: ${NZBGET_CREDENTIALS}   # e.g. nzbget:tegbzn6789

  # ── Monitoring ─────────────────────────────────────────────
  - id: tautulli
    name: Tautulli
    cat: monitor
    icon: monitoring
    host: tautulli.aerie.tv          # public host → iframe embed (behind forward-auth, HTTPS)
    # internalUrl: server-side API calls go here instead of the public host. Use this to keep the
    # API off the public proxy — e.g. a LAN address. Falls back to https://<host> when omitted.
    internalUrl: http://tautulli.lan:8181
    embeddable: true
    note: "Plex stats"
    apiKey: ${TAUTULLI_API_KEY}

  - id: jellystat
    name: Jellystat
    cat: monitor
    icon: insights
    host: jellystat.aerie.tv
    embeddable: true
    note: "Jellyfin stats"
    apiKey: ${JELLYSTAT_API_KEY}

  - id: gatus
    name: Gatus
    cat: monitor
    icon: favorite
    host: status.aerie.tv
    embeddable: true
    note: "Status engine"
    # Optional — only needed if your Gatus API requires a bearer token.
    apiKey: ${GATUS_API_KEY}

  - id: prometheus
    name: Prometheus
    cat: monitor
    icon: query_stats
    host: metrics.aerie.tv
    embeddable: true
    note: "Metrics · admin"
    # Optional — only needed if Prometheus is behind bearer auth.
    apiKey: ${PROMETHEUS_API_KEY}

  - id: beszel
    name: Beszel
    cat: monitor
    icon: dns
    host: beszel.aerie.tv
    embeddable: true
    note: "Metrics · admin"
    # Beszel is a second, admin-selectable source for the System Status metric
    # cards (toggle Prometheus ⇄ Beszel in the header). Its hub is PocketBase,
    # which needs a token, so unlike Prometheus it stays empty without auth.
    #
    # IMPORTANT: auth is PocketBase email + password packed as "email:password"
    # (split on the first ":"). Use a Beszel SUPERUSER so every system is
    # readable without per-system sharing (matches the Homepage widget):
    #   docker exec beszel /beszel superuser upsert you@example.com 'your-password'
    apiKey: ${BESZEL_CREDENTIALS}   # e.g. you@example.com:your-password

  - id: loki
    name: Loki
    cat: monitor
    icon: receipt_long
    host: loki.aerie.tv
    # internalUrl: server-side API calls go to your Loki HTTP endpoint (keep it off the public
    # proxy with a LAN address). Falls back to https://<host> when omitted.
    internalUrl: http://loki.lan:3100
    embeddable: false
    note: "Service logs · admin"
    # Loki powers the admin-only per-service Logs viewer (Admin → Services → Logs). It does NOT
    # drive a panel — each service's recent log tail is fetched on-demand via a LogQL selector
    # ({container="<id>"} by default, or the per-service `lokiQuery` above). Auth is optional:
    #   • a single Bearer token, OR
    #   • "username:password" → sent as HTTP Basic (split on the first ":").
    # Leave the key unset for an open Loki.
    apiKey: ${LOKI_TOKEN}   # optional — Bearer token or user:password

  # ── Infra ──────────────────────────────────────────────────
  - id: authentik
    name: Authentik
    cat: infra
    icon: shield_person
    host: auth.aerie.tv
    embeddable: false
    note: "Identity · OIDC"

  - id: traefik
    name: Traefik
    cat: infra
    icon: dns
    logoSlug: traefik
    host: traefik.aerie.tv
    internalUrl: https://traefik-viewer.aerie.tv
    embeddable: false
    note: "Edge router · read-only insight"
    # `forwardAuth` works on ANY service that sits BEHIND authentik forward-auth (Sonarr,
    # Radarr, Overseerr, …), not just Traefik — AERIE authenticates THROUGH the outpost
    # rather than circumventing it. NOTE: forward-auth owns the Authorization header, so it
    # only conflicts with a service whose OWN auth also uses Authorization (e.g. nzbget's
    # HTTP Basic) AND that you actually place behind the outpost. The common cases coexist
    # fine: X-Api-Key (*arr/Overseerr), query-param (Tautulli/Bazarr), and cookie
    # (qBittorrent) auth are all separate from Authorization. Two flows (pick one):
    #   • bearer — mint a short-lived JWT from authentik's token endpoint
    #     (grant_type=client_credentials). Needs the proxy provider's client_id.
    #   • basic  — send the service-account user:password; the outpost runs the exchange.
    # Use ${ENV_VAR} refs so no plaintext lives in the file. An incomplete entry (e.g. an
    # unresolved env ref) is skipped, not fatal. This is SEPARATE from apiKey above, so a
    # service can carry both (the app's own key must then use a non-Authorization header).
    forwardAuth:
      method: bearer
      tokenUrl: https://auth.aerie.tv/application/o/token/
      clientId: ${TRAEFIK_FA_CLIENT_ID}
      username: ${TRAEFIK_FA_USERNAME}
      password: ${TRAEFIK_FA_PASSWORD}
      scope: openid
      # For HTTP Basic instead, drop tokenUrl/clientId/scope and set method: basic.

# ── Visibility (optional) ────────────────────────────────────
# Which group can see which service. Omit to use AERIE's defaults
# (admins: all; friends: all but infra/prometheus/beszel; guests: streaming).
# beszel, like prometheus, is a metrics-only source: admin-only, never a
# launchable tile, but visible in the Service Health status list.
# Groups referenced here must exist (admins/friends/guests are seeded).
# visibility:
#   - { serviceId: prometheus, groupName: friends, visible: false }
#   - { serviceId: jellyfin,   groupName: guests,  visible: true }

# ── Groups (optional) ────────────────────────────────────────
# Extra visibility groups beyond the seeded admins/friends/guests.
# groups:
#   - { name: family, label: Family }
