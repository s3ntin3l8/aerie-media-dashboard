# ============================================================
# AERIE — deploy behind an existing Traefik + Authentik
# Assumes Traefik is already running and attached to an external
# `proxy` network with a cert resolver named `le`. Adjust names to
# match your setup. See docs/EMBEDDING.md for the iframe requirements.
# ============================================================
services:
  aerie:
    build: .
    # image: ghcr.io/you/aerie:latest   # or pin a built image
    restart: unless-stopped
    env_file: .env
    environment:
      AERIE_PORTAL_URL: ${AERIE_PORTAL_URL:-http://localhost:3000}
      DATABASE_URL: file:/app/data/aerie.db
    volumes:
      - aerie-data:/app/data
    networks: [proxy]
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.aerie.rule=Host(`${AERIE_DOMAIN:-aerie.example.com}`)
      - traefik.http.routers.aerie.entrypoints=websecure
      - traefik.http.routers.aerie.tls.certresolver=le
      - traefik.http.services.aerie.loadbalancer.server.port=3000
      # The portal authenticates via OIDC itself; forward-auth optional here.

      # ── Reusable middlewares (attach to embeddable services) ──
      # 1) Allow framing only from the portal origin (replaces X-Frame-Options).
      - traefik.http.middlewares.aerie-embed.headers.contentSecurityPolicy=frame-ancestors ${AERIE_PORTAL_URL:-http://localhost:3000}
      - traefik.http.middlewares.aerie-embed.headers.customResponseHeaders.X-Frame-Options=
      # 2) Authentik forward-auth (point at your Authentik outpost address).
      - traefik.http.middlewares.authentik.forwardauth.address=http://authentik-server:9000/outpost.goauthentik.io/auth/traefik
      - traefik.http.middlewares.authentik.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.authentik.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid

  # ── Example: an embeddable upstream service ───────────────────
  # Apply BOTH middlewares so the portal can iframe it with SSO:
  #
  #   radarr:
  #     image: lscr.io/linuxserver/radarr
  #     networks: [proxy]
  #     labels:
  #       - traefik.enable=true
  #       - traefik.http.routers.radarr.rule=Host(`radarr.example.com`)
  #       - traefik.http.routers.radarr.entrypoints=websecure
  #       - traefik.http.routers.radarr.tls.certresolver=le
  #       - traefik.http.routers.radarr.middlewares=authentik@docker,aerie-embed@docker
  #       - traefik.http.services.radarr.loadbalancer.server.port=7878

volumes:
  aerie-data:

networks:
  proxy:
    external: true
