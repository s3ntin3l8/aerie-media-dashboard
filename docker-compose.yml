# ============================================================
# AERIE — deploy behind an existing Traefik + Authentik
# Assumes Traefik is already running and attached to an external
# `proxy` network with a cert resolver named `le`. Adjust names to
# match your setup. See docs/EMBEDDING.md for the iframe requirements.
# ============================================================
services:
  aerie:
    image: ghcr.io/s3ntin3l8/aerie:latest
    restart: unless-stopped
    env_file: .env
    # The DB folder is bind-mounted from the host (see volumes below), so the
    # container must run as a user that can write it. Default to the typical
    # first host user (1000:1000) — the owner of ./data. Override via
    # AERIE_UID/AERIE_GID in .env if your host's owner differs.
    user: "${AERIE_UID:-1000}:${AERIE_GID:-1000}"
    environment:
      AERIE_PORTAL_URL: ${AERIE_PORTAL_URL:-http://localhost:3000}
      DATABASE_URL: file:/app/data/aerie.db
      # Auth.js builds OIDC callback/redirect URLs from this. Behind a reverse
      # proxy it otherwise mis-detects the host as the container's internal
      # 0.0.0.0:3000, breaking the Authentik callback. Pin it to the public
      # origin (defaults to the portal URL).
      AUTH_URL: ${AUTH_URL:-${AERIE_PORTAL_URL:-http://localhost:3000}}
      AUTH_TRUST_HOST: "true"
    volumes:
      # Persist the SQLite DB in a host folder, aligned with the dev default
      # (./data/aerie.db). Point AERIE_DATA_DIR elsewhere to relocate it.
      - ${AERIE_DATA_DIR:-./data}:/app/data
    networks: [ proxy ]
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.aerie.rule=Host(`${AERIE_DOMAIN:-aerie.example.com}`)
      - traefik.http.routers.aerie.entrypoints=websecure
      - traefik.http.routers.aerie.tls.certresolver=le
      # Attach HSTS so browsers only ever reach the portal over HTTPS. The app
      # deliberately delegates HSTS to the proxy (see middleware.ts). Without this
      # a default deploy ships with no HSTS — a silent downgrade.
      - traefik.http.routers.aerie.middlewares=aerie-hsts@docker
      - traefik.http.services.aerie.loadbalancer.server.port=3000
      # The portal authenticates via OIDC itself; forward-auth optional here.

      # ── HSTS: only ever reach the portal over HTTPS ──
      # `stsPreload` is intentionally omitted here (it is hard to undo — enable it
      # only when you intend to submit the domain to the HSTS preload list; see
      # docker-compose.traefik.example.yml).
      - traefik.http.middlewares.aerie-hsts.headers.stsSeconds=31536000
      - traefik.http.middlewares.aerie-hsts.headers.stsIncludeSubdomains=true

      # ── Reusable middlewares (attach to embeddable services) ──
      # Allow framing only from the portal origin (replaces X-Frame-Options).
      # Forward-auth comes from the Traefik file provider: forwardAuth-authentik@file
      - traefik.http.middlewares.aerie-embed.headers.contentSecurityPolicy=frame-ancestors ${AERIE_PORTAL_URL:-http://localhost:3000}
      - traefik.http.middlewares.aerie-embed.headers.customResponseHeaders.X-Frame-Options=
  # ── Example: an embeddable upstream service ───────────────────
  # Apply BOTH middlewares so the portal can iframe it with SSO:
  #
  #   radarr:
  #     image: lscr.io/linuxserver/radarr
  #     networks: [proxy]
  #     labels:
  #       - traefik.enable=true
  #       - traefik.http.routers.radarr.rule=Host(`radarr.example.com`)
  #       - traefik.http.routers.radarr.entrypoints=websecure
  #       - traefik.http.routers.radarr.tls.certresolver=le
  #       - traefik.http.routers.radarr.middlewares=forwardAuth-authentik@file,aerie-embed@docker
  #       - traefik.http.services.radarr.loadbalancer.server.port=7878

networks:
  proxy:
    external: true
